<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, minimum-scale=1, user-scalable=no, viewport-fit=cover, interactive-widget=resizes-content">
  <meta name="theme-color" content="#f7f3ee">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Beauty of Joseon Iraq">
  <meta name="mobile-web-app-capable" content="yes">
  <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
  <link rel="manifest" href="manifest.json">
  <meta name="description" content="Beauty of Joseon Iraq"><title>Beauty of Joseon Iraq</title>
  <link rel="stylesheet" href="style.css?v=beauty-20260717"> 
</head>
<body>
  <div id="splashScreen" class="splash-screen" aria-hidden="true">
    <img src="beauty-logo.png" alt="Beauty of Joseon Iraq">
  </div>
  <div class="ambient a1"></div><div class="ambient a2"></div>

  <div id="languageRow" class="language-row container">
    <button type="button" class="lang-btn active" data-lang="ar">العربية</button>
    <button type="button" class="lang-btn" data-lang="en">English</button>
  </div>

  <header id="heroSection" class="hero container">
    <div class="brand-wrap">
      <div id="brandLogo" class="brand-logo"><img src="beauty-logo.png" alt="Beauty of Joseon Iraq"></div>
      <div>
        <h1 id="brandName">Beauty of Joseon Iraq</h1>
        <p id="brandTagline">منتجات مختارة بعناية</p>
      </div>
    </div>
    <a id="whatsappTop" class="whatsapp-mini" target="_blank" rel="noopener">واتساب</a>
  </header>

  <main>
    <section id="adsSection" class="container section-space">
      <div class="section-heading">
        <h2 id="offersTitle" data-i18n="offers">عروض مميزة</h2>
        <div id="sliderDots" class="dots"></div>
      </div>
      <div id="adsSlider" class="ads-slider"></div>
    </section>

    <section id="productsSection" class="container section-space">
      <div class="section-heading products-head">
        <h2 id="productsTitle" data-i18n="products">المنتجات</h2>
        <input id="searchInput" type="search" placeholder="ابحث عن منتج">
      </div>
      <div id="categoryFilters" class="chips"></div>
      <div id="productsGrid" class="products-grid"></div>
      <button id="loadMoreProducts" class="load-more hidden" type="button">عرض المزيد</button>
      <div id="emptyState" class="empty hidden">لا توجد منتجات حالياً</div>
    </section>

    <section id="aboutSection" class="container about-card section-space">
      <h2 id="aboutTitle" data-i18n="about">من نحن</h2>
      <p id="aboutText"></p>
    </section>
  </main>

  <button id="cartFab" class="cart-fab" type="button" aria-label="السلة">
    <span>🛒</span><b id="cartCount">0</b>
  </button>

  <div id="cartDrawer" class="drawer" aria-hidden="true">
    <div class="drawer-panel">
      <div class="drawer-head">
        <h3 data-i18n="cart">سلة المشتريات</h3>
        <button id="closeCart" type="button">✕</button>
      </div>
      <div id="cartItems"></div>
      <div id="receipt" class="receipt"></div>
      <div class="drawer-actions">
        <button id="clearCart" type="button" class="secondary" data-i18n="clearCart">تفريغ السلة</button>
        <a id="whatsappOrder" class="primary" target="_blank" rel="noopener" data-i18n="whatsapp">فتح واتساب</a>
      </div>
      <small class="note" data-i18n="waNote">يفتح واتساب ومعه فاتورة الطلب جاهزة للإرسال.</small>
    </div>
  </div>

  <div id="qtyModal" class="modal hidden">
    <div class="modal-card small-card">
      <button class="modal-close" type="button" data-close="qtyModal">✕</button>
      <img id="qtyImage" class="qty-image" alt="">
      <h3 id="qtyTitle"></h3>
      <label data-i18n="quantity">العدد</label>
      <div class="qty-picker">
        <button id="qtyMinus" type="button" aria-label="تقليل العدد">−</button>
        <input id="qtyInput" type="number" inputmode="numeric" min="1" value="1" aria-label="العدد">
        <button id="qtyPlus" type="button" aria-label="زيادة العدد">+</button>
      </div>
      <button id="confirmAdd" class="primary full" data-i18n="addToCart">إضافة إلى السلة</button>
    </div>
  </div>

  <div id="galleryModal" class="modal hidden">
    <div class="gallery-card">
      <button class="modal-close gallery-close" type="button" data-close="galleryModal">✕</button>
      <button id="galleryPrev" type="button" class="gallery-arrow prev">‹</button>
      <img id="galleryImage" alt="">
      <button id="galleryNext" type="button" class="gallery-arrow next">›</button>
      <div id="galleryCounter" class="gallery-counter"></div>
    </div>
  </div>

  <div id="toast" class="toast"></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase-config.js?v=beauty-20260717"></script>
  <script src="supabase-bridge.js?v=beauty-20260717"></script>
  <script src="store.js?v=beauty-20260717"></script>
  <script src="app.js?v=beauty-20260717"></script>
  <script>
if("serviceWorker" in navigator){
  window.addEventListener("load",()=>navigator.serviceWorker.getRegistrations().then(rs=>rs.forEach(r=>r.unregister())).catch(()=>{}));
}
</script>
</body>
</html>
